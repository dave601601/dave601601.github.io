<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dave601601</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #666;
      --accent: #2563eb;
      --card: #f5f5f5;
      --border: #e5e5e5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --card: #161b22;
        --border: #30363d;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 640px;
      width: 100%;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .tagline {
      color: var(--muted);
      font-size: 1.1rem;
      margin: 0 0 32px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a.btn {
      display: inline-block;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
      transition: border-color 0.15s, transform 0.05s;
    }
    a.btn:hover { border-color: var(--accent); }
    a.btn:active { transform: translateY(1px); }
    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>안녕하세요 👋</h1>
    <p class="tagline">여기는 제 개인 페이지입니다.</p>

    <div class="links">
      <a class="btn" href="https://github.com/dave601601">GitHub</a>
      <a class="btn" href="mailto:bsn012944@gmail.com">Email</a>
    </div>

    <footer>© 2026 dave601601</footer>
  </main>
</body>
</html>
