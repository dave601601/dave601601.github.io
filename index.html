<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dave601601 — Projects</title>

  <!-- ============================================================
       EDIT YOUR PROJECTS HERE
       Each project is one object. Fill in the placeholders.
       - id:          unique slug used in the URL (#/project-1)
       - title:       project title
       - period:      the time span, e.g. "Jan 2026 – Mar 2026"
       - tagline:     one-line summary shown on the overview card
       - video:       demo video. Either
                        • a YouTube link  ("https://youtu.be/XXXX"), or
                        • a video file in this repo ("demo.mp4")
                      Leave the placeholder text to show an empty video box.
       - description: detailed description. Separate paragraphs with a
                      blank line (\n\n).
       ============================================================ -->
  <script>
    const projects = [
      {
        id: "project-1",
        title: "Project 1 — Title goes here",
        period: "Period goes here (e.g. Jan 2026 – Mar 2026)",
        tagline: "One-line summary shown on the card.",
        video: "https://youtu.be/jNQXAC9IVRw",
        description:
          "Write the detailed description of Project 1 here. " +
          "Explain the problem, what you built, the tech stack, your role, and the result.\n\n" +
          "Add another paragraph like this by separating with a blank line.",
      },
      {
        id: "project-2",
        title: "Project 2 — Title goes here",
        period: "Period goes here (e.g. May 2025 – Dec 2025)",
        tagline: "One-line summary shown on the card.",
        video: "https://youtu.be/jNQXAC9IVRw",
        description:
          "Write the detailed description of Project 2 here. " +
          "Explain the problem, what you built, the tech stack, your role, and the result.\n\n" +
          "Add another paragraph like this by separating with a blank line.",
      },
    ];

    // Edit your name / intro here
    const profile = {
      name: "dave601601",
      intro: "Hi 👋 Here are some of the projects I've worked on.",
      github: "https://github.com/dave601601",
    };
  </script>

  <style>
    /* ---- Notion-style theme ---- */
    :root {
      --bg: #ffffff;
      --fg: rgb(55, 53, 47);
      --muted: rgba(55, 53, 47, 0.65);
      --faint: rgba(55, 53, 47, 0.4);
      --accent: rgb(35, 131, 226);
      --card: #ffffff;
      --card-hover: rgba(55, 53, 47, 0.03);
      --card-shadow: rgba(15, 15, 15, 0.1) 0px 0px 0px 1px,
        rgba(15, 15, 15, 0.1) 0px 2px 4px;
      --divider: rgba(55, 53, 47, 0.09);
      --placeholder-bg: rgba(55, 53, 47, 0.03);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: rgb(25, 25, 25);
        --fg: rgba(255, 255, 255, 0.81);
        --muted: rgba(255, 255, 255, 0.44);
        --faint: rgba(255, 255, 255, 0.28);
        --accent: rgb(82, 156, 231);
        --card: rgb(32, 32, 32);
        --card-hover: rgba(255, 255, 255, 0.055);
        --card-shadow: rgba(255, 255, 255, 0.094) 0px 0px 0px 1px,
          rgba(15, 15, 15, 0.3) 0px 2px 4px;
        --divider: rgba(255, 255, 255, 0.13);
        --placeholder-bg: rgba(255, 255, 255, 0.03);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif,
        "Segoe UI Emoji", "Segoe UI Symbol";
      background: var(--bg);
      color: var(--fg);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 72px 40px 96px;
    }
    @media (max-width: 600px) {
      .wrap { padding: 40px 22px 72px; }
    }

    /* Header — Notion page title */
    header { margin-bottom: 8px; }
    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    header p { color: var(--muted); margin: 0 0 10px; font-size: 1rem; }
    header a.gh { color: var(--accent); text-decoration: none; font-size: 0.95rem; }
    header a.gh:hover { text-decoration: underline; }

    /* Overview — Notion gallery cards */
    .grid {
      margin-top: 36px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .card {
      text-align: left;
      background: var(--card);
      border: none;
      border-radius: 8px;
      box-shadow: var(--card-shadow);
      padding: 16px 16px 18px;
      cursor: pointer;
      font: inherit;
      color: inherit;
      transition: background 0.12s ease;
    }
    .card:hover { background: var(--card-hover); }
    .card .period { font-size: 0.78rem; color: var(--faint); }
    .card h3 { margin: 6px 0 6px; font-size: 1.05rem; font-weight: 600; }
    .card .tagline { color: var(--muted); font-size: 0.9rem; margin: 0; }

    /* Detail view */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--muted);
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 4px 8px;
      margin: 0 0 28px -8px;
      border-radius: 6px;
      transition: background 0.12s ease;
    }
    .back:hover { background: var(--card-hover); color: var(--fg); }
    .detail h2 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 6px;
      letter-spacing: -0.01em;
      line-height: 1.25;
    }
    .detail .period { color: var(--muted); font-size: 0.95rem; margin-bottom: 4px; }
    .detail .description {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--divider);
    }
    .detail .description p { margin: 0 0 16px; font-size: 1rem; }

    /* Demo video (responsive 16:9) */
    .video {
      position: relative;
      padding-top: 56.25%;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      box-shadow: var(--card-shadow);
      margin: 8px 0 4px;
    }
    .video iframe, .video video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .video-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--divider);
      border-radius: 8px;
      color: var(--faint);
      background: var(--placeholder-bg);
      margin: 8px 0 4px;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 72px;
      color: var(--faint);
      font-size: 0.82rem;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>

  <script>
    const app = document.getElementById("app");

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    // Turn "\n\n"-separated text into <p> paragraphs
    function renderParagraphs(text) {
      return String(text)
        .split(/\n\s*\n/)
        .map((p) => `<p>${escapeHtml(p.trim())}</p>`)
        .join("");
    }

    function youtubeEmbed(url) {
      const m = url.match(
        /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]+)/
      );
      return m ? `https://www.youtube.com/embed/${m[1]}` : null;
    }

    function renderVideo(video) {
      // Not filled in yet → show an empty placeholder box
      if (!video || /PASTE_|_HERE/.test(video)) {
        return `<div class="video-placeholder">🎬 Demo video goes here</div>`;
      }
      const yt = youtubeEmbed(video);
      if (yt) {
        return `<div class="video"><iframe src="${yt}" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>`;
      }
      // Otherwise treat it as a direct video file (e.g. demo.mp4)
      return `<div class="video"><video src="${escapeHtml(video)}" controls playsinline></video></div>`;
    }

    function renderOverview() {
      const cards = projects.map((p) => `
        <button class="card" onclick="location.hash='#/${p.id}'">
          <div class="period">${escapeHtml(p.period || "")}</div>
          <h3>${escapeHtml(p.title)}</h3>
          <p class="tagline">${escapeHtml(p.tagline || "")}</p>
        </button>
      `).join("");

      app.innerHTML = `
        <header>
          <h1>${escapeHtml(profile.name)}</h1>
          <p>${escapeHtml(profile.intro)}</p>
          <a class="gh" href="${escapeHtml(profile.github)}">GitHub →</a>
        </header>
        <div class="grid">${cards}</div>
        <footer>© 2026 ${escapeHtml(profile.name)}</footer>
      `;
      window.scrollTo(0, 0);
    }

    function renderDetail(project) {
      app.innerHTML = `
        <div class="detail">
          <button class="back" onclick="location.hash=''">← Back to projects</button>
          ${renderVideo(project.video)}
          <h2>${escapeHtml(project.title)}</h2>
          <div class="period">${escapeHtml(project.period || "")}</div>
          <div class="description">${renderParagraphs(project.description || "")}</div>
        </div>
      `;
      window.scrollTo(0, 0);
    }

    function router() {
      const id = location.hash.replace(/^#\/?/, "");
      const project = projects.find((p) => p.id === id);
      if (project) {
        renderDetail(project);
      } else {
        renderOverview();
      }
    }

    window.addEventListener("hashchange", router);
    router();
  </script>
</body>
</html>
