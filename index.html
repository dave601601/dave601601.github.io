<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dave601601 — Projects</title>

  <!-- ============================================================
       EDIT YOUR PROJECTS HERE
       Each project is one object. Fill in the placeholders.
       - id:          unique slug used in the URL (#/project-1)
       - title:       project title
       - period:      the time span, e.g. "Jan 2026 – Mar 2026"
       - tagline:     one-line summary shown on the overview card
       - video:       demo video. Either
                        • a YouTube link  ("https://youtu.be/XXXX"), or
                        • a video file in this repo ("demo.mp4")
                      Leave the placeholder text to show an empty video box.
       - description: detailed description. Separate paragraphs with a
                      blank line (\n\n).
       ============================================================ -->
  <script>
    const projects = [
      {
        id: "project-1",
        title: "Project 1 — Title goes here",
        period: "Period goes here (e.g. Jan 2026 – Mar 2026)",
        tagline: "One-line summary shown on the card.",
        video: "https://youtu.be/jNQXAC9IVRw",
        description:
          "Write the detailed description of Project 1 here. " +
          "Explain the problem, what you built, the tech stack, your role, and the result.\n\n" +
          "Add another paragraph like this by separating with a blank line.",
      },
      {
        id: "project-2",
        title: "Project 2 — Title goes here",
        period: "Period goes here (e.g. May 2025 – Dec 2025)",
        tagline: "One-line summary shown on the card.",
        video: "https://youtu.be/jNQXAC9IVRw",
        description:
          "Write the detailed description of Project 2 here. " +
          "Explain the problem, what you built, the tech stack, your role, and the result.\n\n" +
          "Add another paragraph like this by separating with a blank line.",
      },
    ];

    // Edit your name / intro here
    const profile = {
      name: "dave601601",
      intro: "Hi 👋 Here are some of the projects I've worked on.",
      github: "https://github.com/dave601601",
    };
  </script>

  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #6b7280;
      --accent: #2563eb;
      --card: #f7f7f8;
      --card-hover: #eef0f3;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --card: #161b22;
        --card-hover: #1c232c;
        --border: #30363d;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Header */
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }
    header p { color: var(--muted); margin: 0 0 8px; font-size: 1.05rem; }
    header a.gh { color: var(--accent); text-decoration: none; font-size: 0.95rem; }
    header a.gh:hover { text-decoration: underline; }

    /* Overview grid */
    .grid {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      text-align: left;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      cursor: pointer;
      font: inherit;
      color: inherit;
      transition: background 0.15s, border-color 0.15s, transform 0.08s;
    }
    .card:hover { background: var(--card-hover); border-color: var(--accent); }
    .card:active { transform: translateY(1px); }
    .card .period { font-size: 0.8rem; color: var(--muted); }
    .card h3 { margin: 4px 0 8px; font-size: 1.25rem; }
    .card .tagline { color: var(--muted); font-size: 0.95rem; margin: 0; }

    /* Detail view */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--accent);
      font: inherit;
      cursor: pointer;
      padding: 0;
      margin-bottom: 28px;
    }
    .back:hover { text-decoration: underline; }
    .detail h2 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }
    .detail .period { color: var(--muted); font-size: 0.95rem; margin-bottom: 24px; }
    .detail .description p { margin: 0 0 16px; font-size: 1.05rem; }

    /* Demo video (responsive 16:9) */
    .video {
      position: relative;
      padding-top: 56.25%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin: 8px 0 28px;
    }
    .video iframe, .video video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .video-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 16 / 9;
      border: 2px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
      background: var(--card);
      margin: 8px 0 28px;
      font-size: 0.95rem;
    }

    footer {
      margin-top: 64px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>

  <script>
    const app = document.getElementById("app");

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    // Turn "\n\n"-separated text into <p> paragraphs
    function renderParagraphs(text) {
      return String(text)
        .split(/\n\s*\n/)
        .map((p) => `<p>${escapeHtml(p.trim())}</p>`)
        .join("");
    }

    function youtubeEmbed(url) {
      const m = url.match(
        /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]+)/
      );
      return m ? `https://www.youtube.com/embed/${m[1]}` : null;
    }

    function renderVideo(video) {
      // Not filled in yet → show an empty placeholder box
      if (!video || /PASTE_|_HERE/.test(video)) {
        return `<div class="video-placeholder">🎬 Demo video goes here</div>`;
      }
      const yt = youtubeEmbed(video);
      if (yt) {
        return `<div class="video"><iframe src="${yt}" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>`;
      }
      // Otherwise treat it as a direct video file (e.g. demo.mp4)
      return `<div class="video"><video src="${escapeHtml(video)}" controls playsinline></video></div>`;
    }

    function renderOverview() {
      const cards = projects.map((p) => `
        <button class="card" onclick="location.hash='#/${p.id}'">
          <div class="period">${escapeHtml(p.period || "")}</div>
          <h3>${escapeHtml(p.title)}</h3>
          <p class="tagline">${escapeHtml(p.tagline || "")}</p>
        </button>
      `).join("");

      app.innerHTML = `
        <header>
          <h1>${escapeHtml(profile.name)}</h1>
          <p>${escapeHtml(profile.intro)}</p>
          <a class="gh" href="${escapeHtml(profile.github)}">GitHub →</a>
        </header>
        <div class="grid">${cards}</div>
        <footer>© 2026 ${escapeHtml(profile.name)}</footer>
      `;
      window.scrollTo(0, 0);
    }

    function renderDetail(project) {
      app.innerHTML = `
        <div class="detail">
          <button class="back" onclick="location.hash=''">← Back to projects</button>
          <h2>${escapeHtml(project.title)}</h2>
          <div class="period">${escapeHtml(project.period || "")}</div>
          ${renderVideo(project.video)}
          <div class="description">${renderParagraphs(project.description || "")}</div>
        </div>
      `;
      window.scrollTo(0, 0);
    }

    function router() {
      const id = location.hash.replace(/^#\/?/, "");
      const project = projects.find((p) => p.id === id);
      if (project) {
        renderDetail(project);
      } else {
        renderOverview();
      }
    }

    window.addEventListener("hashchange", router);
    router();
  </script>
</body>
</html>
